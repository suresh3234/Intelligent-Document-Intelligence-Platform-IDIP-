apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: idip-api-error-rate
  namespace: idip
spec:
  metrics:
  - name: error-rate
    interval: 30s
    # Success condition: error rate is less than or equal to 1% (0.01) in a 5-minute sliding window.
    # If the error rate exceeds 1% for 3 intervals (failureLimit: 3), the analysis is marked failed,
    # which triggers Argo Rollouts to automatically abort and rollback the canary deployment.
    successCondition: result[0] <= 0.01
    failureLimit: 3
    provider:
      prometheus:
        address: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(idip_queries_total{status="500"}[5m]))
          /
          (sum(rate(idip_queries_total[5m])) + 0.0001)
