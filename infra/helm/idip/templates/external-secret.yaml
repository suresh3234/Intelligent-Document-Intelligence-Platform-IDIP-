apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "idip.fullname" . }}-secrets
  labels:
    {{- include "idip.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.secretStore.provider }}
    kind: ClusterSecretStore
  target:
    name: {{ include "idip.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: {{ .Values.secretStore.remoteRefKey }}
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.secretStore.remoteRefKey }}
        property: REDIS_URL
    - secretKey: PINECONE_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.remoteRefKey }}
        property: PINECONE_API_KEY
    - secretKey: WEAVIATE_API_KEY
      remoteRef:
        key: {{ .Values.secretStore.remoteRefKey }}
        property: WEAVIATE_API_KEY
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: {{ .Values.secretStore.remoteRefKey }}
        property: JWT_SECRET_KEY
    - secretKey: ADMIN_KEY
      remoteRef:
        key: {{ .Values.secretStore.remoteRefKey }}
        property: ADMIN_KEY
